name: github actions pygame build for iphone 6
on: [push, workflow_dispatch]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: checkout code from github
        uses: actions/checkout@v4

      - name: set up python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install dependencies via brew and pip
        run: |
          pip install kivy-ios
          brew install autoconf automake pkg-config

      - name: build toolchain for pygame
        run: |
          toolchain recipe init
          toolchain build python3 pygame

      - name: create xcode project for iphone
        run: |
          toolchain create "MegaShooter" .

      - name: compile to unsigned ipa file
        run: |
          cd build/megashooter-ios
          xcodebuild -project megashooter.xcodeproj -scheme megashooter -configuration Release -sdk iphoneos -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          mv build/Release-iphoneos/megashooter.app Payload/
          zip -r ../../MegaShooter.ipa Payload/

      - name: upload finished ipa to github artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iphone6-game-ipa
          path: MegaShooter.ipa
